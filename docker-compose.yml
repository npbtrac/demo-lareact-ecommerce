services:
  web-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lareact-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=lareact
      - DB_USERNAME=lareact
      - DB_PASSWORD=secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lareact-network

  web-frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: lareact-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/web:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api
    networks:
      - lareact-network

  db:
    image: mysql:8.0
    container_name: lareact-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootsecret
      - MYSQL_DATABASE=lareact
      - MYSQL_USER=lareact
      - MYSQL_PASSWORD=secret
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lareact-network

volumes:
  db_data:
  frontend_node_modules:

networks:
  lareact-network:
    driver: bridge
